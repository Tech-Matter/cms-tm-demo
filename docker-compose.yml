version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      JWT_SECRET: change_this_to_a_long_random_string
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      DB_PATH: /app/data/cms.db
      FRONTEND_URL: http://localhost:3000
    volumes:
      - cms_data:/app/data
      - cms_uploads:/app/uploads
    networks:
      - cms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: cms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cms-network

volumes:
  cms_data:
  cms_uploads:

networks:
  cms-network:
    driver: bridge
